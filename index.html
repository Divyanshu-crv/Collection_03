<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection_03</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header class="header">

        <div>
            <h1>Collection_03</h1>
            <p>My Personal Resource Hub</p>
        </div>

        <button id="themeBtn" class="theme-btn">
            🌙
        </button>

    </header>

    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search resources..."
        >

    </section>

    <section class="quick-access">

        <h2>⭐ Quick Access</h2>

        <div
            id="quickAccessContainer"
            class="quick-grid"
        ></div>

    </section>

    <section class="stats">

        <div class="stat-card">
            <span id="sectionCount">0</span>
            <p>Sections</p>
        </div>

        <div class="stat-card">
            <span id="linkCount">0</span>
            <p>Links</p>
        </div>

        <div class="stat-card">
            <span id="commandCount">0</span>
            <p>Commands</p>
        </div>

    </section>

    <main
        id="cardContainer"
        class="card-container"
    ></main>

    <div id="modal" class="modal">

        <div class="modal-content">

            <div class="modal-header">

                <h2 id="modalTitle">
                    Section
                </h2>

                <button id="closeModal">
                    ✖
                </button>

            </div>

            <div id="modalBody"></div>

        </div>

    </div>

    <script src="./js/data.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/search.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/modal.js"></script>

</body>
</html>
